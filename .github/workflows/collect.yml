import requests
import pandas as pd
from datetime import datetime
import os

STATUS_URL = "https://gbfs.urbansharing.com/bikemi.com/station_status.json"
OUTPUT_FILE = "bikemi_data.csv"

headers = {
    "Client-Identifier": "student-bikemi-research"
}

timestamp = datetime.utcnow()

response = requests.get(STATUS_URL, headers=headers, timeout=20)
response.raise_for_status()
data = response.json()

stations = data["data"]["stations"]

new_df = pd.DataFrame([{
    "timestamp": timestamp,
    "station_id": s["station_id"],
    "num_bikes_available": s.get("num_bikes_available"),
    "num_docks_available": s.get("num_docks_available")
} for s in stations])

# If no previous file exists, save first snapshot
if not os.path.exists(OUTPUT_FILE):
    new_df.to_csv(OUTPUT_FILE, index=False)
    print("First snapshot saved.")
    exit()

old_df = pd.read_csv(OUTPUT_FILE)

# Get latest saved snapshot
old_df["timestamp"] = pd.to_datetime(old_df["timestamp"])
latest_time = old_df["timestamp"].max()
latest_df = old_df[old_df["timestamp"] == latest_time]

# Compare only station_id + bike/dock availability
compare_cols = ["station_id", "num_bikes_available", "num_docks_available"]

new_compare = new_df[compare_cols].sort_values("station_id").reset_index(drop=True)
latest_compare = latest_df[compare_cols].sort_values("station_id").reset_index(drop=True)

# If same as previous snapshot, skip saving
if new_compare.equals(latest_compare):
    print("No change from previous snapshot. Skipping save.")
else:
    new_df.to_csv(OUTPUT_FILE, mode="a", header=False, index=False)
    print("Availability changed. New snapshot saved.")
